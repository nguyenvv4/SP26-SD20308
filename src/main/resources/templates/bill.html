<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="/bill/add" method="post">
    Code <input type="text" name="code"> <br>
    Total <input type="text" name="total"> <br>
    Status <input type="radio" name="status" value="Active"> Da thanh toan
    <input type="radio" name="status" value="Inactive"> Chua thanh toan
    <br>
    User
    <select th:name="userId">
        <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.fullName}"></option>
    </select> <br>
    <button type="submit">Them</button>

</form>
<table>
    <thead>
    <tr>
        <td>id</td>
        <td>code</td>
        <td>total</td>
        <td>user</td>
        <td>status</td>
        <td>created at</td>
        <td>action</td>
    </tr>
    </thead>
    <tbody>
    <tr th:each="bill: ${bills}">
        <td th:text="${bill.id}"></td>
        <td th:text="${bill.code}"></td>
        <td th:text="${bill.total}"></td>
        <td th:text="${bill.userId.fullName}"></td>
        <td th:text="${bill.status}"></td>
        <td th:text="${bill.createAt}"></td>
        <td><a th:href="@{|/bill/delete?id=${bill.id}|}">delete</a></td>
        <td><a th:href="@{|/bill/detail?id=${bill.id}|}">detail</a></td>
    </tr>
    </tbody>
</table>
</body>
</html>
