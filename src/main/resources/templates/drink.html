<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
<form action="/add" method="post">
    <label>Name</label> <input type="text" name="name"> <br>
    <label>Price</label> <input type="text" name="price"> <br>
    <label>Image</label> <input type="text" name="image"> <br>
    <label>Description</label> <input type="text" name="description"> <br>
    <label>Category</label>
    <select th:name="category">
        <option th:each="c : ${listCategory}"
                th:value="${c.id}"
                th:text="${c.name}">
        </option>
    </select> <br>
    <label>Actvie</label> <input type="radio" name="active" value="true"> Hoat dong
    <input type="radio" name="active" value="false"> Khong hoat dong <br>
    <button type="submit"> Them</button>
</form>
<table class="table table-bordered">
    <thead>
    <tr>
        <td>Id</td>
        <td>Name</td>
        <td>price</td>
    </tr>
    </thead>
    <tbody>
    <tr th:each="drink : ${drinks}">
        <td th:text="${drink.id}"></td>
        <td th:text="${drink.name}"></td>
        <td th:text="${drink.price}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
